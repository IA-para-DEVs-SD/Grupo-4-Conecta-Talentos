<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ConectaTalentos{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-people-fill me-1"></i>ConectaTalentos
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegação">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.url.path.startswith('/vagas') %}active{% endif %}"
                            href="/vagas">
                            <i class="bi bi-briefcase me-1"></i>Vagas
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/docs" target="_blank" title="API Docs">
                            <i class="bi bi-code-slash me-1"></i>API
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Toast container -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;" id="toast-container">
        {% if messages %}
            {% for level, message in messages %}
            <div class="toast align-items-center text-bg-{{ level }} border-0 show" role="alert"
                aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="5000">
                <div class="d-flex">
                    <div class="toast-body">
                        <i class="bi {{ 'bi-check-circle' if level == 'success' else 'bi-exclamation-triangle' if level == 'warning' else 'bi-x-circle' if level == 'danger' else 'bi-info-circle' }} me-2"></i>
                        {{ message }}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast" aria-label="Fechar"></button>
                </div>
            </div>
            {% endfor %}
        {% endif %}
    </div>

    <main class="container mt-4 mb-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-3 bg-light text-center text-muted">
        <div class="container">
            <small>ConectaTalentos &copy; 2026 — Grupo 4</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
    <script>
        // Flash messages via query params
        (function() {
            const params = new URLSearchParams(window.location.search);
            const msg = params.get('msg');
            const level = params.get('msg_level') || 'success';
            if (msg) {
                showToast(decodeURIComponent(msg), level);
                // Limpa os params da URL sem recarregar
                params.delete('msg');
                params.delete('msg_level');
                const cleanUrl = params.toString()
                    ? window.location.pathname + '?' + params.toString()
                    : window.location.pathname;
                window.history.replaceState({}, '', cleanUrl);
            }
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
