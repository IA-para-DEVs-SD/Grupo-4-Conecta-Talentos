{% extends "base.html" %}
{% block title %}{% if vaga %}Editar{% else %}Nova{% endif %} Vaga — ConectaTalentos{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-8">
    <h2 class="mb-4">{% if vaga %}Editar Vaga{% else %}Nova Vaga{% endif %}</h2>

    <form method="post" action="{% if vaga %}/vagas/{{ vaga.id }}/editar{% else %}/vagas/criar{% endif %}">
        <div class="mb-3">
            <label class="form-label fw-semibold">Título da Vaga *</label>
            <input type="text" name="titulo" class="form-control"
                   value="{{ vaga.titulo if vaga else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Descrição *</label>
            <textarea name="descricao" class="form-control" rows="3" required>{{ vaga.descricao if vaga else '' }}</textarea>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Requisitos Técnicos *
                <small class="text-muted fw-normal">(separados por vírgula)</small>
            </label>
            <input type="text" name="requisitos_tecnicos" class="form-control"
                   value="{{ vaga.requisitos_tecnicos | join(', ') if vaga else '' }}"
                   placeholder="Python, FastAPI, SQLAlchemy" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Experiência Mínima *</label>
            <input type="text" name="experiencia_minima" class="form-control"
                   value="{{ vaga.experiencia_minima if vaga else '' }}"
                   placeholder="2 anos em desenvolvimento backend" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Competências Desejadas
                <small class="text-muted fw-normal">(separadas por vírgula)</small>
            </label>
            <input type="text" name="competencias_desejadas" class="form-control"
                   value="{{ vaga.competencias_desejadas | join(', ') if vaga else '' }}"
                   placeholder="Trabalho em equipe, Comunicação">
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="/vagas/" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
</div>
{% endblock %}
