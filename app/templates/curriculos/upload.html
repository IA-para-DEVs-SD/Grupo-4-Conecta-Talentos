{% extends "base.html" %}
{% block title %}Upload de Currículo — ConectaTalentos{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-6">
    <h2 class="mb-1">Upload de Currículo</h2>
    <p class="text-muted mb-4">Vaga: <strong>{{ vaga.titulo }}</strong></p>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post" action="/curriculos/upload/{{ vaga.id }}"
                  enctype="multipart/form-data" id="uploadForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Arquivo PDF *</label>
                    <input type="file" name="arquivo" class="form-control"
                           accept=".pdf" required id="fileInput">
                    <div class="form-text">Máximo 10MB, até 10 páginas.</div>
                </div>

                <div id="progressArea" class="d-none mb-3">
                    <div class="d-flex align-items-center gap-2 text-primary">
                        <div class="spinner-border spinner-border-sm"></div>
                        <span>Processando currículo com IA...</span>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        Enviar e Analisar
                    </button>
                    <a href="/vagas/{{ vaga.id }}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</div>

<script>
document.getElementById('uploadForm').addEventListener('submit', function() {
    document.getElementById('progressArea').classList.remove('d-none');
    document.getElementById('submitBtn').disabled = true;
});
</script>
{% endblock %}
